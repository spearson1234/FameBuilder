    <style>
        .custom-leaflet-icon { background: transparent; border: none; }
        .cube-wrapper { perspective: 1000px; width: 80px; height: 80px; margin-bottom: 30px; animation: runBounce 0.4s infinite alternate ease-in-out; z-index: 10; margin-left: auto; margin-right: auto; }
        .cube { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; animation: spin3D 5s infinite linear; }
        .face { position: absolute; width: 80px; height: 80px; background: linear-gradient(135deg, #2a2a2a, #0a0a0a); border: 2px solid #555; border-radius: 12px; box-shadow: inset 0 0 15px rgba(0,0,0,0.9); }
        .dot { position: absolute; width: 14px; height: 14px; background-color: #fff; border-radius: 50%; box-shadow: 0 0 8px rgba(255,255,255,0.8); }
        .front { transform: rotateY(0deg) translateZ(40px); } .back { transform: rotateY(180deg) translateZ(40px); }
        .right { transform: rotateY(90deg) translateZ(40px); } .left { transform: rotateY(-90deg) translateZ(40px); }
        .top { transform: rotateX(90deg) translateZ(40px); } .bottom { transform: rotateX(-90deg) translateZ(40px); }
        .tl { top: 12px; left: 12px; } .tr { top: 12px; right: 12px; } .ml { top: 31px; left: 12px; } .mr { top: 31px; right: 12px; } .c { top: 31px; left: 31px; } .bl { bottom: 12px; left: 12px; } .br { bottom: 12px; right: 12px; }
        @keyframes spin3D { 0% { transform: rotateX(-20deg) rotateY(0deg) rotateZ(0deg); } 100% { transform: rotateX(-20deg) rotateY(360deg) rotateZ(0deg); } }
        @keyframes runBounce { 0% { transform: translateY(0px) scaleY(0.95); } 100% { transform: translateY(-25px) scaleY(1.05); } }
        @keyframes legSwing1 { 0% { transform: rotate(30deg) translateY(0px); } 100% { transform: rotate(-50deg) translateY(-10px); } }
        @keyframes legSwing2 { 0% { transform: rotate(-50deg) translateY(-10px); } 100% { transform: rotate(30deg) translateY(0px); } }
        
        .marker-label {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.2);
            pointer-events: none;
        }

        .backup-pulse {
            animation: backupPing 1s infinite alternate;
        }
        @keyframes backupPing {
            from { transform: scale(1); filter: brightness(1); }
            to { transform: scale(1.1); filter: brightness(1.5); }
        }
    </style>

    <script type="module">
        // ================================================
        // FIREBASE CONFIG
        // ================================================
        const firebaseConfig = {
            apiKey: "AIzaSyAHSW4ettEHj3Y562zYSI_n0Z1OwFaGsgw",
            authDomain: "login-71866.firebaseapp.com",
            databaseURL: "https://login-71866-default-rtdb.firebaseio.com",
            projectId: "login-71866",
            storageBucket: "login-71866.firebasestorage.app",
            messagingSenderId: "434042354282",
            appId: "1:434042354282:web:fbc98eaefe2ef6513a2813"
        };

        const SHARED_GAME_ID = "main_server_v2"; // Unique version key

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const rtdb = firebase.database();
        const CATCH_RADIUS_METERS = 30;

        let currentUser = null, myRole = null, myLoc = null, myPlayerNumber = null;
        let myTrail = [], isCaught = false, map = null, watchId = null, heartbeatInterval = null;
        let mapMarkers = {}, trailPolylines = {}, otherPlayers = {};
        let targetArrestId = null, targetArrestNumber = null, activeBackupTarget = null;
        let lastHandledBackupTime = Date.now();
        let myRtdbRef = null;

        // Sound Engine
        const playBackupSound = () => {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(440, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
                oscillator.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.5);
            } catch (e) { console.error("Audio error", e); }
        };

        const showView = (id) => {
            ['view-intro', 'view-locating', 'view-playing', 'view-arrest-modal', 'view-caught'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        };

        const showError = (msg) => {
            document.getElementById('error-msg-text').innerHTML += `<br>• ${msg}`;
            document.getElementById('error-msg').classList.remove('hidden');
        };

        // Firebase connection status UI
        rtdb.ref(".info/connected").on("value", (snap) => {
            const statusEl = document.getElementById('server-status');
            if (snap.val() === true) {
                statusEl.innerHTML = `<div class="flex items-center justify-center gap-2"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="text-green-300"><polyline points="20 6 9 17 4 12"></polyline></svg> LIVE: ${SHARED_GAME_ID}</div>`;
                statusEl.className = "absolute top-0 left-0 w-full bg-green-600 text-white text-[10px] font-black py-2 z-[60] uppercase tracking-widest transition-all";
                setTimeout(() => statusEl.classList.add('hidden'), 3000);
            } else {
                statusEl.innerHTML = `<div class="flex items-center justify-center gap-2"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="text-red-300"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg> CONNECTING...</div>`;
                statusEl.className = "absolute top-0 left-0 w-full bg-red-600 text-white text-[10px] font-black py-2 z-[60] uppercase tracking-widest transition-all";
                statusEl.classList.remove('hidden');
            }
        });

        const initAuth = async () => {
            try { await auth.signInAnonymously(); }
            catch (err) { showError(`AUTH FAILED: ${err.message}`); }
        };
        initAuth();

        auth.onAuthStateChanged((user) => {
            currentUser = user;
            if (user) {
                document.getElementById('auth-loading').classList.add('hidden');
                document.getElementById('role-buttons').classList.remove('hidden');
                myRtdbRef = rtdb.ref(`games/${SHARED_GAME_ID}/players/${user.uid}`);
                myRtdbRef.onDisconnect().remove();
            }
        });

        const updateLocationOnServer = (lat, lng) => {
            if (!currentUser || !myRtdbRef) return;
            
            if (myRole === 'robber') {
                if (myTrail.length === 0) myTrail.push({lat, lng});
                else {
                    const lastP = myTrail[myTrail.length - 1];
                    if (getDistance(lastP.lat, lastP.lng, lat, lng) > 5) {
                        myTrail.push({lat, lng});
                        if (myTrail.length > 50) myTrail.shift();
                    }
                }
            }

            myRtdbRef.update({
                role: myRole,
                lat: lat,
                lng: lng,
                isCaught: isCaught,
                playerNumber: myPlayerNumber || null,
                trail: myRole === 'robber' ? myTrail : null,
                timestamp: Date.now()
            }).catch(err => console.error(`Sync error: ${err.message}`));
        };

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const p1 = lat1 * Math.PI / 180;
            const p2 = lat2 * Math.PI / 180;
            const dp = (lat2 - lat1) * Math.PI / 180;
            const dl = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        window.joinGame = (selectedRole) => {
            if (!currentUser) return;
            myRole = selectedRole;
            isCaught = false;
            myTrail = [];
            lastHandledBackupTime = Date.now();
            showView('view-locating');

            if (myRole === 'robber') {
                myPlayerNumber = Math.floor(1000 + Math.random() * 9000);
                document.getElementById('my-robber-number').innerText = myPlayerNumber;
                document.getElementById('robber-id-display').classList.remove('hidden');
                document.getElementById('robber-id-display').classList.add('flex');
            } else {
                document.getElementById('cop-backup-display').classList.remove('hidden');
            }

            document.getElementById('hud-role-text').innerText = myRole.toUpperCase();
            document.getElementById('hud-role-indicator').className = `w-2.5 h-2.5 rounded-full ${myRole === 'cop' ? 'bg-blue-500' : 'bg-red-500'}`;

            document.getElementById('hud-hint').innerHTML = myRole === 'cop'
                ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-400"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg> <span class="text-blue-300">Tap Robber within 30m to arrest!</span>`
                : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-red-400"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg> <span class="text-red-300">Cops are searching for you! RUN!</span>`;

            if (!navigator.geolocation) {
                startGameplay({ coords: { latitude: 51.505, longitude: -0.09 } });
            } else {
                navigator.geolocation.getCurrentPosition(
                    (pos) => startGameplay(pos),
                    () => startGameplay({ coords: { latitude: 51.505, longitude: -0.09 } }),
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            }
        };

        const startGameplay = (pos) => {
            myLoc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            updateLocationOnServer(myLoc.lat, myLoc.lng);
            showView('view-playing');
            
            if (!map) {
                map = L.map('map', { zoomControl: false, attributionControl: false }).setView([myLoc.lat, myLoc.lng], 18);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 }).addTo(map);
            }

            if (navigator.geolocation) {
                watchId = navigator.geolocation.watchPosition(
                    (p) => {
                        myLoc = { lat: p.coords.latitude, lng: p.coords.longitude };
                        updateLocationOnServer(myLoc.lat, myLoc.lng);
                        document.getElementById('gps-warning').classList.add('hidden');
                    },
                    () => { document.getElementById('gps-warning').classList.remove('hidden'); },
                    { enableHighAccuracy: true, maximumAge: 0, timeout: 15000 }
                );
            }

            rtdb.ref(`games/${SHARED_GAME_ID}/players`).on('value', (snapshot) => {
                const data = snapshot.val() || {};
                otherPlayers = {};
                let count = 0;

                const now = Date.now();
                Object.keys(data).forEach(id => {
                    const p = data[id];
                    if (!p || (now - p.timestamp > 30000)) return;

                    if (id === currentUser.uid) {
                        if (p.isCaught && !isCaught && myRole === 'robber') {
                            isCaught = true;
                            showView('view-caught');
                        }
                        count++;
                        return;
                    }

                    // Backup detection for Cops
                    if (myRole === 'cop' && p.role === 'cop' && p.needsBackup && p.needsBackup > lastHandledBackupTime) {
                        lastHandledBackupTime = p.needsBackup;
                        activeBackupTarget = { lat: p.lat, lng: p.lng };
                        document.getElementById('view-backup-request').classList.remove('hidden');
                        playBackupSound();
                    }

                    otherPlayers[id] = p;
                    count++;
                });

                document.getElementById('hud-players-count').innerText = count;
                renderMapMarkers();
            });
        };

        const renderMapMarkers = () => {
            const currentIds = Object.keys(otherPlayers);
            Object.keys(mapMarkers).forEach(id => {
                if (id !== 'me' && id !== 'my_circle' && !currentIds.includes(id)) {
                    map.removeLayer(mapMarkers[id]);
                    delete mapMarkers[id];
                    if (trailPolylines[id]) {
                        map.removeLayer(trailPolylines[id]);
                        delete trailPolylines[id];
                    }
                }
            });

            if (myLoc && myRole) {
                const colorClass = myRole === 'cop' ? 'bg-blue-500 shadow-[0_0_15px_rgba(59,130,246,1)]' : 'bg-red-500 shadow-[0_0_15px_rgba(239,68,68,1)]';
                const shapeClass = myRole === 'cop' ? 'rounded-sm' : 'rounded-full';
                const iconHtml = `
                    <div class="relative w-5 h-5 ${colorClass} ${shapeClass} border-2 border-white flex items-center justify-center z-50">
                        <div class="absolute -inset-2 rounded-full border-2 border-white animate-ping opacity-50"></div>
                        <div class="marker-label">YOU</div>
                    </div>`;
                const customIcon = L.divIcon({ html: iconHtml, className: 'custom-leaflet-icon', iconSize: [30, 30], iconAnchor: [15, 15] });
                
                if (!mapMarkers['me']) {
                    mapMarkers['me'] = L.marker([myLoc.lat, myLoc.lng], { icon: customIcon, zIndexOffset: 1000 }).addTo(map);
                } else {
                    mapMarkers['me'].setLatLng([myLoc.lat, myLoc.lng]);
                }

                if (myRole === 'cop') {
                    if (!mapMarkers['my_circle']) {
                        mapMarkers['my_circle'] = L.circle([myLoc.lat, myLoc.lng], { color: '#3b82f6', fillColor: '#3b82f6', fillOpacity: 0.1, radius: CATCH_RADIUS_METERS }).addTo(map);
                    } else {
                        mapMarkers['my_circle'].setLatLng([myLoc.lat, myLoc.lng]);
                    }
                }
            }

            Object.entries(otherPlayers).forEach(([id, p]) => {
                if (!p.lat || !p.lng || p.isCaught) {
                    if (mapMarkers[id]) {
                        map.removeLayer(mapMarkers[id]);
                        delete mapMarkers[id];
                    }
                    return;
                }

                const isTeammate = p.role === myRole;
                const roleLabel = p.role === 'cop' ? 'COP' : `ID: ${p.playerNumber || '???'}`;
                const colorClass = p.role === 'cop' ? 'bg-blue-500' : 'bg-red-500';
                const shapeClass = p.role === 'cop' ? 'rounded-sm' : 'rounded-full';
                
                // Add pulse if this cop requested backup recently
                const isBackingUp = (p.needsBackup && (Date.now() - p.needsBackup < 15000));
                const pulseClass = isBackingUp ? 'backup-pulse' : '';

                const iconHtml = `
                    <div class="relative w-5 h-5 ${colorClass} ${shapeClass} ${pulseClass} border-2 border-white flex items-center justify-center">
                        <div class="marker-label ${isTeammate ? 'text-green-400' : 'text-white'}">
                            ${isTeammate ? '[TEAM] ' : ''}${roleLabel}
                        </div>
                    </div>`;
                
                const customIcon = L.divIcon({ html: iconHtml, className: 'custom-leaflet-icon', iconSize: [30, 30], iconAnchor: [15, 15] });

                if (!mapMarkers[id]) {
                    const marker = L.marker([p.lat, p.lng], { icon: customIcon }).addTo(map);
                    marker.on('click', () => {
                        if (myRole === 'cop' && p.role === 'robber') {
                            const dist = getDistance(myLoc.lat, myLoc.lng, p.lat, p.lng);
                            if (dist <= CATCH_RADIUS_METERS) {
                                targetArrestId = id;
                                targetArrestNumber = p.playerNumber;
                                showView('view-arrest-modal');
                            } else {
                                alert(`Target is too far (${Math.round(dist)}m). Get within ${CATCH_RADIUS_METERS}m.`);
                            }
                        }
                    });
                    mapMarkers[id] = marker;
                } else {
                    mapMarkers[id].setLatLng([p.lat, p.lng]);
                    mapMarkers[id].setIcon(customIcon);
                }

                if (myRole === 'cop' && p.role === 'robber' && p.trail && p.trail.length > 1) {
                    const coords = p.trail.map(c => [c.lat, c.lng]);
                    if (!trailPolylines[id]) {
                        trailPolylines[id] = L.polyline(coords, { color: '#ef4444', weight: 3, opacity: 0.5, dashArray: '5, 10' }).addTo(map);
                    } else {
                        trailPolylines[id].setLatLngs(coords);
                    }
                }
            });
        };

        // UI Event Listeners
        document.getElementById('btn-accept-backup').addEventListener('click', () => {
            if (activeBackupTarget && map) {
                map.setView([activeBackupTarget.lat, activeBackupTarget.lng], 19);
                document.getElementById('view-backup-request').classList.add('hidden');
            }
        });

        document.getElementById('camera-input').addEventListener('change', function(e) {
            if (e.target.files && e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = function(evt) {
                    document.getElementById('camera-preview').src = evt.target.result;
                    document.getElementById('camera-preview').classList.remove('hidden');
                    document.getElementById('confirm-arrest-btn').classList.remove('hidden');
                    document.getElementById('confirm-arrest-btn').classList.add('flex');
                    document.getElementById('open-cam-btn').classList.add('hidden');
                };
                reader.readAsDataURL(e.target.files[0]);
            }
        });

        window.closeArrestModal = () => {
            targetArrestId = null; targetArrestNumber = null;
            document.getElementById('camera-preview').classList.add('hidden');
            document.getElementById('confirm-arrest-btn').classList.add('hidden');
            document.getElementById('confirm-arrest-btn').classList.remove('flex');
            document.getElementById('open-cam-btn').classList.remove('hidden');
            document.getElementById('ocr-loading').classList.add('hidden');
            document.getElementById('ocr-loading').classList.remove('flex');
            document.getElementById('camera-input').value = "";
            showView('view-playing');
        };

        window.submitArrest = async () => {
            if (!targetArrestId || !targetArrestNumber) return;
            document.getElementById('confirm-arrest-btn').classList.add('hidden');
            document.getElementById('confirm-arrest-btn').classList.remove('flex');
            document.getElementById('ocr-loading').classList.remove('hidden');
            document.getElementById('ocr-loading').classList.add('flex');
            
            try {
                const result = await Tesseract.recognize(document.getElementById('camera-preview').src, 'eng');
                const scannedText = result.data.text.toLowerCase();
                
                if (scannedText.includes(targetArrestNumber.toString())) {
                    rtdb.ref(`games/${SHARED_GAME_ID}/players/${targetArrestId}`).update({ isCaught: true });
                    alert(`✅ POSITIVE IDENTIFICATION! ID ${targetArrestNumber} apprehended.`);
                } else {
                    alert(`❌ ID MISMATCH! Expected: ${targetArrestNumber}. Scan again.`);
                }
            } catch (err) { 
                console.error(err);
                alert("Scanner processing error."); 
            }
            closeArrestModal();
        };

        window.callBackup = () => {
            if (myRole !== 'cop' || !currentUser) return;
            rtdb.ref(`games/${SHARED_GAME_ID}/players/${currentUser.uid}`).update({ needsBackup: Date.now() });
            const btn = document.getElementById('cop-backup-display').querySelector('button');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = `<span class="text-[9px] uppercase tracking-widest font-black mt-1">DISPATCHED</span>`;
            btn.classList.replace('bg-blue-600', 'bg-green-600');
            setTimeout(() => {
                btn.classList.replace('bg-green-600', 'bg-blue-600');
                btn.innerHTML = originalHTML;
            }, 5000);
        };

        document.addEventListener('visibilitychange', () => {
            if (currentUser && myRole && myRtdbRef) {
                if (document.visibilityState === 'hidden') {
                    myRtdbRef.update({ lastActive: Date.now() });
                }
            }
        });
    </script>
</body>
</html>
