<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catch & Flee IRL</title>
    
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet CSS & JS for the Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* 3D Dice Animations & Styles */
        .cube-wrapper { perspective: 1000px; width: 80px; height: 80px; margin-bottom: 30px; animation: runBounce 0.4s infinite alternate ease-in-out; z-index: 10; margin-left: auto; margin-right: auto; }
        .cube { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; animation: spin3D 5s infinite linear; }
        .face { position: absolute; width: 80px; height: 80px; background: linear-gradient(135deg, #2a2a2a, #0a0a0a); border: 2px solid #555; border-radius: 12px; box-shadow: inset 0 0 15px rgba(0,0,0,0.9); }
        .dot { position: absolute; width: 14px; height: 14px; background-color: #fff; border-radius: 50%; box-shadow: 0 0 8px rgba(255,255,255,0.8); }
        .front  { transform: rotateY(  0deg) translateZ(40px); } .back   { transform: rotateY(180deg) translateZ(40px); }
        .right  { transform: rotateY( 90deg) translateZ(40px); } .left   { transform: rotateY(-90deg) translateZ(40px); }
        .top    { transform: rotateX( 90deg) translateZ(40px); } .bottom { transform: rotateX(-90deg) translateZ(40px); }
        .tl { top: 12px; left: 12px; } .tr { top: 12px; right: 12px; } .ml { top: 31px; left: 12px; } .mr { top: 31px; right: 12px; } .c  { top: 31px; left: 31px; } .bl { bottom: 12px; left: 12px; } .br { bottom: 12px; right: 12px; }
        @keyframes spin3D { 0% { transform: rotateX(-20deg) rotateY(0deg) rotateZ(0deg); } 100% { transform: rotateX(-20deg) rotateY(360deg) rotateZ(0deg); } }
        @keyframes runBounce { 0% { transform: translateY(0px) scaleY(0.95); } 100% { transform: translateY(-25px) scaleY(1.05); } }
        @keyframes legSwing1 { 0% { transform: rotate(30deg) translateY(0px); } 100% { transform: rotate(-50deg) translateY(-10px); } }
        @keyframes legSwing2 { 0% { transform: rotate(-50deg) translateY(-10px); } 100% { transform: rotate(30deg) translateY(0px); } }
        
        /* Map Custom Icon Overrides */
        .custom-leaflet-icon { background: transparent; border: none; }
    </style>
</head>
<body class="bg-neutral-900 text-white overflow-hidden font-sans select-none">

    <!-- VIEW: INTRO MENU -->
    <div id="view-intro" class="absolute inset-0 bg-black flex flex-col items-center justify-center z-40">
        <div class="absolute inset-0 z-0 opacity-20 pointer-events-none">
            <div class="absolute top-1/4 left-1/4 w-64 h-64 bg-blue-600 rounded-full mix-blend-screen filter blur-3xl animate-pulse"></div>
            <div class="absolute top-1/3 right-1/4 w-64 h-64 bg-red-600 rounded-full mix-blend-screen filter blur-3xl animate-pulse" style="animation-delay: 1s;"></div>
        </div>
        
        <div class="z-10 flex flex-col items-center max-w-lg w-full px-6 text-center">
            <!-- 3D Dice Logo -->
            <div class="relative w-48 h-56 flex flex-col items-center justify-end mb-4">
                <div class="cube-wrapper">
                    <div class="cube">
                        <div class="face front"><div class="dot c bg-red-500 shadow-[0_0_12px_rgba(239,68,68,1)]"></div></div>
                        <div class="face back"><div class="dot tl"></div><div class="dot br"></div></div>
                        <div class="face right"><div class="dot tl bg-blue-500 shadow-[0_0_12px_rgba(59,130,246,1)]"></div><div class="dot c bg-blue-500 shadow-[0_0_12px_rgba(59,130,246,1)]"></div><div class="dot br bg-blue-500 shadow-[0_0_12px_rgba(59,130,246,1)]"></div></div>
                        <div class="face left"><div class="dot tl"></div><div class="dot tr"></div><div class="dot bl"></div><div class="dot br"></div></div>
                        <div class="face top"><div class="dot tl"></div><div class="dot tr"></div><div class="dot c"></div><div class="dot bl"></div><div class="dot br"></div></div>
                        <div class="face bottom"><div class="dot tl"></div><div class="dot tr"></div><div class="dot ml"></div><div class="dot mr"></div><div class="dot bl"></div><div class="dot br"></div></div>
                    </div>
                </div>
                <div class="absolute bottom-2 w-24 h-20 flex justify-center items-start z-0 drop-shadow-[0_0_8px_rgba(255,255,255,0.5)]">
                    <svg style="animation: legSwing1 0.2s infinite alternate ease-in-out; transform-origin: top center;" class="absolute w-10 h-20 text-white" viewBox="0 0 24 48"><path d="M 12 0 C 12 15, 2 25, 2 35 L -4 40" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" /></svg>
                    <svg style="animation: legSwing2 0.2s infinite alternate ease-in-out; transform-origin: top center;" class="absolute w-10 h-20 text-gray-400" viewBox="0 0 24 48"><path d="M 12 0 C 12 15, 22 25, 22 35 L 28 40" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" /></svg>
                </div>
            </div>

            <h1 class="text-5xl md:text-7xl font-black italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-br from-white via-gray-300 to-gray-600 mb-2 drop-shadow-lg">CATCH & FLEE</h1>
            
            <p class="text-gray-400 mb-2 text-lg uppercase tracking-widest font-semibold">IRL Pursuit</p>
            <p class="text-gray-500 mb-8 text-sm">📍 You must allow Location Sharing to play!</p>
            
            <div id="error-msg" class="hidden bg-red-500/20 border border-red-500 text-red-200 p-4 rounded-xl mb-6 text-sm font-medium shadow-lg max-w-sm"></div>

            <div id="auth-loading" class="animate-pulse text-xl text-yellow-400 font-bold">Connecting...</div>
            
            <div id="role-buttons" class="hidden w-full flex flex-col gap-4 justify-center max-w-xs mx-auto">
                <button onclick="joinGame('cop')" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 px-6 rounded-xl border-b-4 border-blue-800 active:border-b-0 active:translate-y-1 transition-all shadow-lg text-lg tracking-wider">PLAY AS COP</button>
                <button onclick="joinGame('robber')" class="w-full bg-red-600 hover:bg-red-500 text-white font-bold py-4 px-6 rounded-xl border-b-4 border-red-800 active:border-b-0 active:translate-y-1 transition-all shadow-lg text-lg tracking-wider">PLAY AS ROBBER</button>
            </div>
        </div>
    </div>

    <!-- VIEW: LOCATING -->
    <div id="view-locating" class="hidden absolute inset-0 bg-black flex flex-col items-center justify-center text-center z-40 p-6">
        <h2 class="text-3xl font-black mb-4 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-red-400 animate-pulse">ACQUIRING SATELLITE LOCK...</h2>
        <p class="text-gray-400 text-sm mt-4 max-w-xs">Connecting to GPS. This may take a moment...</p>
    </div>

    <!-- VIEW: ACTIVE MAP -->
    <div id="view-playing" class="hidden absolute inset-0 z-10">
        <div id="map" class="absolute inset-0 z-0"></div>
        
        <!-- GPS WARNING BANNER (Only shows if GPS is taking too long) -->
        <div id="gps-warning" class="hidden absolute top-24 left-1/2 transform -translate-x-1/2 bg-yellow-500 text-black px-5 py-2 rounded-full text-xs font-black z-20 animate-pulse shadow-lg whitespace-nowrap tracking-wider">
            WAITING FOR GPS SIGNAL...
        </div>

        <!-- HUD -->
        <div class="absolute top-4 left-4 right-4 z-10 flex flex-col gap-2 pointer-events-none">
            <div class="flex justify-between items-start">
                <div class="bg-black/70 backdrop-blur-md border border-neutral-700 p-4 rounded-2xl shadow-xl pointer-events-auto">
                    <div class="text-xs text-gray-400 uppercase tracking-widest font-bold mb-1">Role</div>
                    <div class="flex items-center gap-2">
                        <div id="hud-role-indicator" class="w-3 h-3 rounded-full animate-pulse bg-white"></div>
                        <span id="hud-role-text" class="font-black text-2xl uppercase text-white">ROLE</span>
                    </div>
                </div>
                <div class="bg-black/70 backdrop-blur-md border border-neutral-700 p-3 rounded-2xl shadow-xl pointer-events-auto text-right">
                    <div class="text-xs text-gray-400 uppercase tracking-widest font-bold">Online</div>
                    <div class="font-bold text-white text-lg"><span id="hud-players-count">1</span> Players</div>
                </div>
            </div>
        </div>

        <!-- Hint -->
        <div class="absolute bottom-6 left-1/2 transform -translate-x-1/2 z-10 pointer-events-none w-11/12 max-w-sm">
            <div class="bg-black/80 backdrop-blur-md border border-neutral-700 p-4 rounded-xl text-center shadow-2xl">
                <p id="hud-hint" class="text-sm font-medium"></p>
            </div>
        </div>
    </div>

    <!-- VIEW: CAUGHT -->
    <div id="view-caught" class="hidden absolute inset-0 z-50 bg-black/95 flex flex-col items-center justify-center p-6 text-center backdrop-blur-md">
        <h2 class="text-7xl font-black text-red-500 mb-4 animate-bounce tracking-tighter">BUSTED!</h2>
        <p class="text-gray-300 mb-8 text-lg max-w-xs">A cop got within 30 meters of your physical location!</p>
        <button onclick="returnToMenu()" class="bg-white text-black font-black text-xl py-4 px-12 rounded-full active:bg-gray-300 transition-colors shadow-[0_0_40px_rgba(255,255,255,0.4)]">MAIN MENU</button>
    </div>


    <!-- CORE JAVASCRIPT LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, setDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- GITHUB CONFIGURATION ---
        const githubFirebaseConfig = {
            apiKey: "AIzaSyAHSW4ettEHj3Y562zYSI_n0Z1OwFaGsgw",
            authDomain: "login-71866.firebaseapp.com",
            databaseURL: "https://login-71866-default-rtdb.firebaseio.com",
            projectId: "login-71866",
            storageBucket: "login-71866.firebasestorage.app",
            messagingSenderId: "434042354282",
            appId: "1:434042354282:web:fbc98eaefe2ef6513a2813"
        }; 
        
        const isCanvas = typeof __firebase_config !== 'undefined';
        const firebaseConfig = isCanvas ? JSON.parse(__firebase_config) : githubFirebaseConfig;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- GAME VARIABLES ---
        const CATCH_RADIUS_METERS = 30;
        const COP_RADAR_METERS = 200;
        
        let currentUser = null;
        let myRole = null;
        let myLoc = null;
        let isCaught = false;
        let map = null;
        let watchId = null;
        let unsubscribeSnapshot = null;
        let mapMarkers = {}; 
        let otherPlayers = {};

        // --- DOM Elements ---
        const showView = (id) => {
            ['view-intro', 'view-locating', 'view-playing', 'view-caught'].forEach(v => {
                document.getElementById(v).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
        };

        const showError = (msg) => {
            const errEl = document.getElementById('error-msg');
            errEl.innerText = msg;
            errEl.classList.remove('hidden');
        };

        // --- 1. Auth Init ---
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth Error:", err);
            }
        };
        
        initAuth();

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('auth-loading').classList.add('hidden');
                document.getElementById('role-buttons').classList.remove('hidden');
            }
        });

        // Haversine Distance
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const p1 = lat1 * Math.PI / 180;
            const p2 = lat2 * Math.PI / 180;
            const dp = (lat2 - lat1) * Math.PI / 180;
            const dl = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        const updateLocationOnServer = (lat, lng, role = myRole) => {
            if (!currentUser) return;
            const playerDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'players', currentUser.uid);
            setDoc(playerDocRef, { role: role, lat: lat, lng: lng, isCaught: isCaught, lastActive: Date.now() }, { merge: true });
        };

        // --- 2. JOIN GAME LOGIC (UNBLOCKABLE) ---
        window.joinGame = (selectedRole) => {
            if (!currentUser) return;
            myRole = selectedRole;
            isCaught = false;
            document.getElementById('error-msg').classList.add('hidden');
            showView('view-locating');

            if (!navigator.geolocation) {
                // Device straight up doesn't have GPS. Let them in anyway with default loc.
                console.warn("No geolocation API.");
                myLoc = { lat: 0, lng: 0 }; 
                startGameplay(true);
                return;
            }

            // Setup HUD text
            document.getElementById('hud-role-text').innerText = myRole;
            const indicator = document.getElementById('hud-role-indicator');
            indicator.className = `w-3 h-3 rounded-full animate-pulse ${myRole === 'cop' ? 'bg-blue-500' : 'bg-red-500'}`;
            
            const hint = document.getElementById('hud-hint');
            hint.className = `text-sm font-medium ${myRole === 'cop' ? 'text-blue-300' : 'text-red-300'}`;
            hint.innerText = myRole === 'cop' 
                ? "Physically patrol the area. Robbers only appear on radar when within 200m!" 
                : "RUN! Cops are tracking you IRL. Stay out of their 30m catch radius!";

            // Try to get location, but give it a short timeout so they don't get stuck looking at the "Locating" screen forever
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    // Success!
                    myLoc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    updateLocationOnServer(myLoc.lat, myLoc.lng, myRole);
                    startGameplay(false);
                },
                (err) => {
                    // Failed or took too long (user might have permissions acting weird)
                    // Let them into the game anyway, show a warning, and wait for `watchPosition` to catch up!
                    console.warn("Initial GPS fetch failed or timed out. Dropping into map anyway...", err);
                    myLoc = { lat: 51.505, lng: -0.09 }; // Temporary default location (London)
                    startGameplay(true); // true = show warning banner
                },
                { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 } // Only wait 5 seconds max before forcing entry
            );
        };

        window.returnToMenu = () => {
            if (watchId) navigator.geolocation.clearWatch(watchId);
            if (unsubscribeSnapshot) unsubscribeSnapshot();
            document.getElementById('gps-warning').classList.add('hidden');
            showView('view-intro');
        };

        // --- 3. ACTIVE GAMEPLAY LOGIC ---
        const startGameplay = (isWaitingForGps) => {
            showView('view-playing');
            
            if (isWaitingForGps) {
                document.getElementById('gps-warning').classList.remove('hidden');
            } else {
                document.getElementById('gps-warning').classList.add('hidden');
            }

            // Initialize Map
            if (!map) {
                map = L.map('map', { zoomControl: false }).setView([myLoc.lat, myLoc.lng], 18);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; OpenStreetMap', maxZoom: 20
                }).addTo(map);
            } else {
                map.panTo(new L.LatLng(myLoc.lat, myLoc.lng));
            }

            // Start Continuous GPS Tracking
            if (navigator.geolocation) {
                watchId = navigator.geolocation.watchPosition(
                    (pos) => {
                        myLoc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                        updateLocationOnServer(myLoc.lat, myLoc.lng);
                        map.panTo(new L.LatLng(myLoc.lat, myLoc.lng));
                        
                        // Hide the warning banner once the phone finally gets a lock!
                        document.getElementById('gps-warning').classList.add('hidden');
                        
                        checkCatchLogic(); 
                    },
                    (err) => {
                        console.warn("Watch position error/timeout:", err);
                        // Don't kick them out, just show the warning banner
                        document.getElementById('gps-warning').classList.remove('hidden');
                    },
                    { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
                );
            }

            // Listen to other players in real-time
            const playersRef = collection(db, 'artifacts', appId, 'public', 'data', 'players');
            unsubscribeSnapshot = onSnapshot(playersRef, (snapshot) => {
                const currentPlayers = {};
                let count = 0;
                
                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    if (data.lastActive && (Date.now() - data.lastActive > 15 * 60 * 1000)) return; // ignore inactive (>15m)
                    currentPlayers[docSnap.id] = data;
                    count++;
                    
                    // Did I get caught globally?
                    if (docSnap.id === currentUser.uid && data.isCaught && !isCaught && myRole === 'robber') {
                        isCaught = true;
                        showView('view-caught');
                    }
                });

                document.getElementById('hud-players-count').innerText = count;
                otherPlayers = currentPlayers;
                renderMapMarkers();
                checkCatchLogic();
            });
        };

        const checkCatchLogic = () => {
            // Can't get caught if we don't have a real location yet
            if (myRole !== 'robber' || isCaught || !myLoc || document.getElementById('gps-warning').classList.contains('hidden') === false) return;
            
            const cops = Object.values(otherPlayers).filter(p => p.role === 'cop' && p.lat && p.lng);
            for (let cop of cops) {
                if (getDistance(myLoc.lat, myLoc.lng, cop.lat, cop.lng) < CATCH_RADIUS_METERS) {
                    isCaught = true;
                    updateLocationOnServer(myLoc.lat, myLoc.lng, myRole); // save caught status
                    showView('view-caught');
                    break;
                }
            }
        };

        const renderMapMarkers = () => {
            // Clear old markers completely to avoid sync issues
            Object.values(mapMarkers).forEach(m => map.removeLayer(m));
            mapMarkers = {};

            Object.entries(otherPlayers).forEach(([id, p]) => {
                if (!p.lat || !p.lng) return;
                if (p.isCaught && p.role === 'robber') return;

                const isMe = id === currentUser?.uid;
                const isCop = p.role === 'cop';
                let isVisible = true;

                // Secrecy Logic: Cops can't see robbers far away
                if (!isMe && myRole === 'cop' && p.role === 'robber' && myLoc) {
                    if (getDistance(myLoc.lat, myLoc.lng, p.lat, p.lng) > COP_RADAR_METERS) {
                        isVisible = false;
                    }
                }

                if (isVisible) {
                    const colorClass = isCop ? 'bg-blue-500 shadow-[0_0_15px_rgba(59,130,246,0.8)]' : 'bg-red-500 shadow-[0_0_15px_rgba(239,68,68,0.8)]';
                    const shapeClass = isCop ? 'rounded-sm' : 'rounded-full';
                    const mePulse = isMe ? '<div class="absolute -inset-2 rounded-full border-2 border-white animate-ping opacity-50"></div>' : '';

                    const iconHtml = `<div class="relative w-5 h-5 ${colorClass} ${shapeClass} border-2 border-white flex items-center justify-center z-50">${mePulse}</div>`;
                    const customIcon = L.divIcon({ html: iconHtml, className: 'custom-leaflet-icon', iconSize: [20, 20], iconAnchor: [10, 10] });

                    const marker = L.marker([p.lat, p.lng], { icon: customIcon }).addTo(map);
                    mapMarkers[id] = marker;

                    // Draw the blue radar circle around myself if I am a cop
                    if (isMe && myRole === 'cop') {
                        const circle = L.circle([p.lat, p.lng], { color: '#3b82f6', fillColor: '#3b82f6', fillOpacity: 0.1, radius: COP_RADAR_METERS, weight: 1, dashArray: '5, 10' }).addTo(map);
                        mapMarkers[`${id}_circle`] = circle;
                    }
                }
            });
        };

    </script>
</body>
</html>
